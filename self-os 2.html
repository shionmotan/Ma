<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self OS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #F8F7F5;
      color: #1A1A1A;
      font-family: 'DM Sans', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }
    textarea, button, input { font-family: inherit; }
    button { cursor: pointer; }

    /* ---- Setup screen ---- */
    #setup-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px 24px;
      background: linear-gradient(160deg, #fff 60%, #F0EEF8 100%);
    }
    #setup-screen h1 { font-size: 30px; color: #1A1A1A; font-weight: 300; letter-spacing: -0.5px; margin-bottom: 6px; }
    #setup-screen .setup-sub { font-size: 12px; color: #9B8FA8; letter-spacing: 0.2em; margin-bottom: 28px; }
    #setup-screen p { font-size: 13px; color: #9B8FA8; line-height: 1.9; margin-bottom: 28px; text-align: center; max-width: 320px; }
    #setup-screen input {
      width: 100%; max-width: 360px;
      background: #fff;
      border: 1.5px solid #E8E4F0;
      border-radius: 14px;
      color: #1A1A1A;
      font-size: 14px;
      padding: 13px 18px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    #setup-screen input:focus { border-color: #B8A8D8; }
    #setup-screen button {
      width: 100%; max-width: 360px;
      background: #1A1A1A;
      border: none;
      color: #fff;
      padding: 14px;
      border-radius: 14px;
      font-size: 13px;
      letter-spacing: 0.08em;
      transition: opacity 0.2s;
    }
    #setup-screen button:hover { opacity: 0.8; }

    /* ---- App ---- */
    #app { display: none; }

    header {
      border-bottom: 1px solid #EDEAF5;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0;
      background: rgba(248,247,245,0.95);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .header-logo { display: flex; align-items: baseline; gap: 6px; }
    .header-logo .word { font-size: 11px; letter-spacing: 0.3em; color: #C0B8D0; font-weight: 400; }
    .header-logo .os { font-size: 18px; color: #1A1A1A; font-weight: 300; letter-spacing: -0.5px; }
    .header-logo .ver { font-size: 10px; color: #D0C8E0; letter-spacing: 0.2em; }
    .header-nav { display: flex; gap: 4px; }
    .nav-btn {
      background: transparent; border: 1px solid transparent;
      color: #C0B8D0; padding: 5px 14px; border-radius: 20px;
      font-size: 11px; letter-spacing: 0.1em; transition: all 0.2s;
    }
    .nav-btn.active { background: #1A1A1A; color: #fff; border-color: #1A1A1A; }

    main { padding: 24px 20px 100px; max-width: 640px; margin: 0 auto; }

    /* Stats */
    .stats-bar {
      display: flex; gap: 0; margin-bottom: 16px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #EDEAF5;
      overflow: hidden;
    }
    .stat-item { text-align: center; flex: 1; padding: 14px 8px; border-right: 1px solid #F2EFF8; }
    .stat-item:last-child { border-right: none; }
    .stat-num { font-size: 20px; font-weight: 300; letter-spacing: -0.5px; }
    .stat-label { font-size: 9px; color: #C0B8D0; letter-spacing: 0.15em; margin-top: 2px; }

    /* Export/Import */
    .data-actions { display: flex; gap: 8px; margin-bottom: 16px; }
    .data-btn {
      flex: 1; background: #fff; border: 1px solid #EDEAF5;
      color: #B0A8C0; border-radius: 12px; padding: 10px 0;
      font-size: 11px; letter-spacing: 0.1em; transition: all 0.2s;
    }
    .data-btn:hover { border-color: #C8BEE0; color: #7B6E9A; }
    .data-btn.success { color: #7EC8A0; border-color: #B8E8D0; background: #F5FBF8; }
    .data-btn.error   { color: #E89898; border-color: #F0C8C8; background: #FDF5F5; }

    /* Category grid */
    .cat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 24px; }
    .cat-card {
      background: #fff; border: 1px solid #EDEAF5;
      border-radius: 16px; padding: 16px 12px;
      text-align: left; color: #1A1A1A; transition: all 0.2s;
    }
    .cat-card:hover { border-color: #D8D0EC; box-shadow: 0 2px 12px rgba(180,160,220,0.1); }
    .cat-card .icon { font-size: 16px; margin-bottom: 8px; }
    .cat-card .name { font-size: 12px; font-weight: 500; margin-bottom: 3px; }
    .cat-card .count { font-size: 10px; color: #C0B8D0; }

    /* Recent */
    .section-label { font-size: 10px; color: #C0B8D0; letter-spacing: 0.3em; margin-bottom: 12px; }
    .recent-item {
      padding: 12px 0; border-bottom: 1px solid #F2EFF8;
      display: flex; gap: 12px; align-items: flex-start;
    }
    .recent-item .icon { font-size: 12px; margin-top: 2px; }
    .recent-item .tag { font-size: 13px; margin-bottom: 3px; font-weight: 500; }
    .recent-item .summary { font-size: 11px; color: #A8A0B8; line-height: 1.5; }
    .recent-item .date { font-size: 10px; color: #D0C8E0; white-space: nowrap; }
    .empty-msg { text-align: center; padding: 48px 0; color: #C0B8D0; font-size: 13px; line-height: 2.2; }

    /* Category view */
    .back-btn {
      background: none; border: none; color: #C0B8D0; font-size: 11px;
      letter-spacing: 0.15em; margin-bottom: 20px; padding: 0;
      display: flex; align-items: center; gap: 6px;
    }
    .back-btn:hover { color: #7B6E9A; }
    .cat-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .cat-tab {
      background: #fff; border: 1px solid #EDEAF5; color: #B0A8C0;
      padding: 5px 14px; border-radius: 20px; font-size: 11px; transition: all 0.2s;
    }
    .cat-tab:hover { border-color: #C8BEE0; color: #7B6E9A; }
    .input-box {
      background: #fff; border: 1px solid #EDEAF5;
      border-radius: 16px; padding: 18px; margin-bottom: 20px;
    }
    .input-label { font-size: 11px; color: #A8A0B8; margin-bottom: 10px; letter-spacing: 0.15em; }
    .input-box textarea {
      width: 100%; background: #F8F7FB; border: 1px solid #EDEAF5;
      border-radius: 10px; color: #1A1A1A; font-size: 13px;
      line-height: 1.8; padding: 12px 14px; resize: none;
      min-height: 90px; outline: none; transition: border-color 0.2s;
    }
    .input-box textarea:focus { border-color: #C8BEE0; }
    .input-box textarea::placeholder { color: #D0C8E0; }
    .save-btn {
      float: right; margin-top: 10px;
      background: #1A1A1A; border: none; color: #fff;
      padding: 8px 22px; border-radius: 20px; font-size: 12px;
      letter-spacing: 0.05em; transition: opacity 0.2s;
    }
    .save-btn:hover { opacity: 0.75; }
    .save-btn:disabled { opacity: 0.3; cursor: wait; }

    /* Entry card */
    .entry-card { padding: 16px 0; border-bottom: 1px solid #F2EFF8; }
    .entry-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .entry-tag { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .entry-summary { font-size: 12px; color: #A8A0B8; line-height: 1.6; margin-bottom: 6px; }
    .entry-raw-toggle { font-size: 10px; color: #C8C0D8; letter-spacing: 0.1em; cursor: pointer; list-style: none; }
    .entry-raw { font-size: 11px; color: #A8A0B8; line-height: 1.7; margin-top: 6px; padding-left: 10px; border-left: 2px solid #EDE8F8; }
    .entry-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; margin-left: 12px; }
    .entry-date { font-size: 9px; color: #D0C8E0; white-space: nowrap; }
    .entry-btns { display: flex; gap: 4px; }
    .edit-btn { background: none; border: none; color: #C0B8D0; font-size: 10px; padding: 2px 6px; }
    .del-btn  { background: none; border: none; color: #D8D0E8; font-size: 11px; padding: 2px 6px; }
    .edit-btn:hover { color: #7B6E9A; }
    .del-btn:hover  { color: #E89898; }

    /* Edit inline */
    .edit-label { font-size: 10px; color: #A8A0B8; letter-spacing: 0.2em; margin-bottom: 8px; }
    .edit-area {
      width: 100%; background: #F8F7FB; border: 1.5px solid #C8BEE0;
      border-radius: 10px; color: #1A1A1A; font-size: 13px;
      line-height: 1.7; padding: 10px 12px; resize: none; min-height: 80px; outline: none;
    }
    .edit-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
    .cancel-btn {
      background: none; border: 1px solid #EDEAF5; color: #B0A8C0;
      padding: 5px 14px; border-radius: 16px; font-size: 11px;
    }
    .cancel-btn:hover { border-color: #C8BEE0; color: #7B6E9A; }
    .update-btn {
      background: #1A1A1A; border: none; color: #fff;
      padding: 5px 16px; border-radius: 16px; font-size: 11px;
    }
    .update-btn:hover { opacity: 0.75; }
    .update-btn:disabled { opacity: 0.3; cursor: wait; }

    /* Insight view */
    .insight-intro { font-size: 13px; color: #A8A0B8; line-height: 1.9; margin-bottom: 20px; }
    .insight-textarea {
      width: 100%; background: #fff; border: 1px solid #EDEAF5;
      border-radius: 12px; color: #1A1A1A; font-size: 13px;
      line-height: 1.8; padding: 14px 16px; resize: none;
      min-height: 90px; outline: none; margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .insight-textarea:focus { border-color: #C8BEE0; }
    .insight-textarea::placeholder { color: #D0C8E0; }
    .ask-btn {
      width: 100%; background: #1A1A1A; border: none; color: #fff;
      padding: 12px 24px; border-radius: 14px; font-size: 13px;
      letter-spacing: 0.05em; transition: opacity 0.2s;
    }
    .ask-btn:hover { opacity: 0.8; }
    .ask-btn:disabled { opacity: 0.3; cursor: wait; }
    .thinking { padding: 36px; text-align: center; color: #C0B8D0; font-size: 12px; letter-spacing: 0.2em; }
    .thinking .spin { font-size: 20px; margin-bottom: 10px; }
    .insight-result {
      background: #fff; border: 1px solid #EDEAF5;
      border-radius: 16px; padding: 22px 20px;
      margin-top: 20px; margin-bottom: 20px;
    }
    .insight-text { font-size: 14px; line-height: 2; color: #2A2A2A; white-space: pre-wrap; }
    .your-data { margin-top: 20px; }
    .your-data-cat { margin-bottom: 16px; }
    .your-data-label { font-size: 11px; margin-bottom: 8px; letter-spacing: 0.1em; font-weight: 500; }
    .tag-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag-pill {
      background: #F4F2FA; border: 1px solid #EAE6F5;
      border-radius: 20px; padding: 4px 14px; font-size: 11px; color: #9B8FA8;
    }

    /* Bottom nav */
    nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(248,247,245,0.97);
      backdrop-filter: blur(16px);
      border-top: 1px solid #EDEAF5;
      display: flex; justify-content: center; gap: 4px;
      padding: 10px 20px 18px;
    }
    .bottom-btn {
      flex: 1; max-width: 100px; background: transparent; border: none;
      color: #C0B8D0; padding: 8px 4px; border-radius: 12px; font-size: 10px;
      letter-spacing: 0.1em; display: flex; flex-direction: column;
      align-items: center; gap: 4px; transition: all 0.2s;
    }
    .bottom-btn.active { background: #1A1A1A; color: #fff; }
    .bottom-btn .bicon { font-size: 15px; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(240,238,248,0.7);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .modal {
      background: #fff; border: 1px solid #EDEAF5;
      border-radius: 20px; padding: 24px; width: 100%; max-width: 500px;
      display: flex; flex-direction: column; gap: 14px;
      box-shadow: 0 8px 40px rgba(160,140,200,0.12);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 11px; color: #C0B8D0; letter-spacing: 0.3em; }
    .modal-close { background: none; border: none; color: #C0B8D0; font-size: 18px; }
    .modal-close:hover { color: #7B6E9A; }
    .modal-desc { font-size: 12px; color: #A8A0B8; line-height: 1.7; }
    .modal textarea {
      width: 100%; height: 200px;
      background: #F8F7FB; border: 1px solid #EDEAF5;
      border-radius: 10px; color: #9B8FA8; font-size: 11px;
      font-family: monospace; padding: 12px; resize: none; outline: none;
    }
    .copy-btn {
      background: #1A1A1A; border: none; color: #fff;
      padding: 12px; border-radius: 12px; font-size: 12px;
      letter-spacing: 0.08em; transition: opacity 0.2s;
    }
    .copy-btn:hover { opacity: 0.8; }
    .copy-btn.copied { background: #7EC8A0; }
  </style>
</head>
<body>

<!-- Setup Screen -->
<div id="setup-screen">
  <h1>Self OS</h1>
  <div class="setup-sub">your personal analysis journal</div>
  <p>Claude APIキーを入力してください。<br>キーはブラウザのローカルに保存され、外部には送信されません。</p>
  <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" />
  <button onclick="startApp()">はじめる</button>
</div>

<!-- App -->
<div id="app">
  <header>
    <div class="header-logo">
      <span class="word">Self</span>
      <span class="os">OS</span>
      <span class="ver">v1.0</span>
    </div>
    <div class="header-nav">
      <button class="nav-btn active" onclick="showView('dashboard')" id="hbtn-dashboard">記録</button>
      <button class="nav-btn" onclick="showView('category')" id="hbtn-category">カテゴリ</button>
      <button class="nav-btn" onclick="showView('insight')" id="hbtn-insight">洞察</button>
    </div>
  </header>

  <main>
    <!-- DASHBOARD -->
    <div id="view-dashboard">
      <div class="stats-bar" id="stats-bar"></div>

      <div class="data-actions">
        <button class="data-btn" id="export-btn" onclick="handleExport()">↓ エクスポート</button>
        <button class="data-btn" id="import-btn" onclick="document.getElementById('import-file').click()">↑ インポート</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)" />
      </div>

      <div class="cat-grid" id="cat-grid"></div>

      <div class="section-label">RECENT</div>
      <div id="recent-list"></div>
    </div>

    <!-- CATEGORY -->
    <div id="view-category" style="display:none">
      <button class="back-btn" onclick="showView('dashboard')">← ダッシュボード</button>
      <div class="cat-tabs" id="cat-tabs"></div>
      <div class="input-box">
        <div class="input-label" id="input-label"></div>
        <textarea id="new-entry-text" rows="4" placeholder="思ったことをそのまま書いてください…"></textarea>
        <button class="save-btn" id="add-btn" onclick="addEntry()">記録する</button>
        <div style="clear:both"></div>
      </div>
      <div class="section-label" id="records-label"></div>
      <div id="entries-list"></div>
    </div>

    <!-- INSIGHT -->
    <div id="view-insight" style="display:none">
      <div class="section-label">AI INSIGHT</div>
      <p class="insight-intro">記録した自己分析データを元に、AIが深い洞察を提供します。気になることを何でも聞いてみてください。</p>
      <textarea class="insight-textarea" id="insight-question" placeholder="例：私の強みと弱みのパターンは？ / 今の状況に向いている仕事は？ / 服装で気をつけるべきことは？"></textarea>
      <button class="ask-btn" id="ask-btn" onclick="generateInsight()">AIに聞く</button>
      <div id="insight-output"></div>
      <div id="your-data-section"></div>
    </div>
  </main>

  <nav>
    <button class="bottom-btn active" id="bbtn-dashboard" onclick="showView('dashboard')"><span class="bicon">◈</span>記録</button>
    <button class="bottom-btn" id="bbtn-category" onclick="showView('category')"><span class="bicon">◎</span>カテゴリ</button>
    <button class="bottom-btn" id="bbtn-insight" onclick="showView('insight')"><span class="bicon">◐</span>洞察</button>
  </nav>

  <!-- Export Modal -->
  <div class="modal-overlay" id="export-modal" style="display:none" onclick="closeExportModal(event)">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">EXPORT DATA</span>
        <button class="modal-close" onclick="document.getElementById('export-modal').style.display='none'">×</button>
      </div>
      <p class="modal-desc">下のJSONをコピーして、テキストファイルに保存しておくとバックアップになります。</p>
      <textarea id="export-textarea" readonly></textarea>
      <button class="copy-btn" id="copy-btn" onclick="handleCopy()">クリップボードにコピー</button>
    </div>
  </div>
</div>

<script>
const CATEGORIES = [
  { id: "personality",   label: "性格",       icon: "◈", color: "#9B8FA8", desc: "強み・弱み・価値観" },
  { id: "skills",        label: "スキル",      icon: "◎", color: "#7EB0C8", desc: "能力・習熟度" },
  { id: "tendencies",    label: "傾向",        icon: "◐", color: "#9B8FC8", desc: "行動パターン・習慣" },
  { id: "fashion",       label: "ファッション", icon: "◉", color: "#7EC8A0", desc: "似合う服・スタイル" },
  { id: "career",        label: "経歴",        icon: "◑", color: "#C8A87E", desc: "経験・転機・学び" },
  { id: "relationships", label: "関係性",      icon: "◌", color: "#E89898", desc: "人間関係の傾向" },
];

const STORAGE_KEY = "self-os-data-v1";
const API_KEY_KEY  = "self-os-apikey-v1";

let ENTRIES = { personality:[], skills:[], tendencies:[], fashion:[], career:[], relationships:[] };
let activeCategory = "personality";
let currentView    = "dashboard";
let editingEntry   = null; // { catId, entryId }
let apiKey = "";

/* ---- Init ---- */
function startApp() {
  const key = document.getElementById("api-key-input").value.trim();
  if (!key.startsWith("sk-ant-")) { alert("APIキーは sk-ant- で始まる文字列です"); return; }
  apiKey = key;
  localStorage.setItem(API_KEY_KEY, key);
  document.getElementById("setup-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadData();
  render();
}

window.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem(API_KEY_KEY);
  if (saved) {
    apiKey = saved;
    document.getElementById("setup-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadData();
    render();
  }
});

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) ENTRIES = JSON.parse(raw);
  } catch {}
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(ENTRIES));
}

/* ---- Views ---- */
function showView(v) {
  currentView = v;
  ["dashboard","category","insight"].forEach(id => {
    document.getElementById("view-"+id).style.display = id === v ? "block" : "none";
    document.getElementById("hbtn-"+id).className = "nav-btn" + (id === v ? " active" : "");
    document.getElementById("bbtn-"+id).className  = "bottom-btn" + (id === v ? " active" : "");
  });
  if (v === "category") renderCategory();
  if (v === "dashboard") renderDashboard();
}

/* ---- Claude API ---- */
async function askClaude(system, user) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system,
      messages: [{ role: "user", content: user }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text || "";
}

/* ---- Add Entry ---- */
async function addEntry() {
  const text = document.getElementById("new-entry-text").value.trim();
  if (!text) return;
  const btn = document.getElementById("add-btn");
  btn.disabled = true; btn.textContent = "AIが整理中…";
  const cat = CATEGORIES.find(c => c.id === activeCategory);
  const system = `あなたは自己分析の専門家です。ユーザーが「${cat.label}」カテゴリに記録した内容を、簡潔で本質的なタグ（3〜5語）に変換してください。返答はJSONのみ。形式: {"tag": "簡潔なラベル", "summary": "1〜2文の本質的な洞察"}`;
  let tag = text.slice(0,20), summary = "";
  try {
    const raw = await askClaude(system, text);
    const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
    tag = parsed.tag || tag; summary = parsed.summary || "";
  } catch {}
  ENTRIES[activeCategory].push({ id: Date.now(), raw: text, tag, summary, createdAt: new Date().toLocaleDateString("ja-JP") });
  saveData();
  document.getElementById("new-entry-text").value = "";
  btn.disabled = false; btn.textContent = "記録する";
  renderCategory();
}

/* ---- Remove Entry ---- */
function removeEntry(catId, id) {
  ENTRIES[catId] = ENTRIES[catId].filter(e => e.id !== id);
  saveData();
  renderCategory();
  renderDashboard();
}

/* ---- Edit Entry ---- */
function startEdit(catId, entryId) {
  editingEntry = { catId, entryId };
  renderCategory();
}

async function saveEdit(catId, entryId) {
  const ta = document.getElementById("edit-area-"+entryId);
  if (!ta) return;
  const text = ta.value.trim();
  if (!text) return;
  const btn = document.getElementById("update-btn-"+entryId);
  btn.disabled = true; btn.textContent = "AI再分析中…";
  const cat = CATEGORIES.find(c => c.id === catId);
  const system = `あなたは自己分析の専門家です。ユーザーが「${cat.label}」カテゴリに記録した内容を、簡潔で本質的なタグ（3〜5語）に変換してください。返答はJSONのみ。形式: {"tag": "簡潔なラベル", "summary": "1〜2文の本質的な洞察"}`;
  let tag = text.slice(0,20), summary = "";
  try {
    const raw = await askClaude(system, text);
    const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
    tag = parsed.tag || tag; summary = parsed.summary || "";
  } catch {}
  ENTRIES[catId] = ENTRIES[catId].map(e => e.id === entryId ? { ...e, raw: text, tag, summary } : e);
  saveData();
  editingEntry = null;
  renderCategory();
  renderDashboard();
}

function cancelEdit() { editingEntry = null; renderCategory(); }

/* ---- Generate Insight ---- */
async function generateInsight() {
  const q = document.getElementById("insight-question").value.trim();
  if (!q) return;
  const btn = document.getElementById("ask-btn");
  btn.disabled = true; btn.textContent = "分析中…";
  document.getElementById("insight-output").innerHTML = `<div class="thinking"><div class="spin">◈</div>thinking...</div>`;

  const allData = CATEGORIES.map(cat => {
    const items = ENTRIES[cat.id];
    if (!items.length) return null;
    return `【${cat.label}】\n${items.map(e => `- ${e.tag}: ${e.summary||e.raw}`).join("\n")}`;
  }).filter(Boolean).join("\n\n");

  const system = `あなたは深い自己理解を助けるコーチです。ユーザーの自己分析データを元に、鋭く、具体的で、思わず「そうだ」と思えるような洞察を提供してください。表面的なことは言わず、パターンや矛盾、隠れた強みを見つけ出してください。200〜300字程度で、日本語で答えてください。`;
  const user = `私の自己分析データ:\n${allData||"（まだデータがありません）"}\n\n質問: ${q}`;

  let insight = "";
  try { insight = await askClaude(system, user); }
  catch { insight = "AIとの接続に失敗しました。しばらくしてから試してください。"; }

  document.getElementById("insight-output").innerHTML = `
    <div class="insight-result">
      <div class="section-label">INSIGHT</div>
      <div class="insight-text">${escHtml(insight)}</div>
    </div>`;
  btn.disabled = false; btn.textContent = "AIに聞く";
  renderYourData();
}

/* ---- Export / Import ---- */
function handleExport() {
  const data = JSON.stringify({ version:"self-os-v1", exportedAt: new Date().toISOString(), entries: ENTRIES }, null, 2);
  document.getElementById("export-textarea").value = data;
  document.getElementById("export-modal").style.display = "flex";
  document.getElementById("copy-btn").className = "copy-btn";
  document.getElementById("copy-btn").textContent = "クリップボードにコピー";
}
function closeExportModal(e) { if (e.target.id==="export-modal") document.getElementById("export-modal").style.display="none"; }
async function handleCopy() {
  const text = document.getElementById("export-textarea").value;
  try { await navigator.clipboard.writeText(text); } catch { document.getElementById("export-textarea").select(); document.execCommand("copy"); }
  const btn = document.getElementById("copy-btn");
  btn.className = "copy-btn copied"; btn.textContent = "✓ コピーしました";
  setTimeout(() => { btn.className="copy-btn"; btn.textContent="クリップボードにコピー"; }, 2500);
}
function handleImport(e) {
  const file = e.target.files?.[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      const data = parsed.entries || parsed;
      if (!CATEGORIES.every(cat => Array.isArray(data[cat.id]))) throw new Error();
      ENTRIES = data; saveData();
      const btn = document.getElementById("import-btn");
      btn.textContent = "✓ 読み込み完了"; btn.className = "data-btn success";
      setTimeout(() => { btn.textContent="↑ インポート"; btn.className="data-btn"; }, 3000);
      render();
    } catch {
      const btn = document.getElementById("import-btn");
      btn.textContent = "✗ 形式エラー"; btn.className = "data-btn error";
      setTimeout(() => { btn.textContent="↑ インポート"; btn.className="data-btn"; }, 3000);
    }
  };
  reader.readAsText(file);
  e.target.value = "";
}

/* ---- Render ---- */
function render() { renderDashboard(); }

function totalCount() { return Object.values(ENTRIES).flat().length; }

function renderDashboard() {
  // Stats
  const stats = document.getElementById("stats-bar");
  stats.innerHTML = `<div class="stat-item"><div class="stat-num" style="color:#C8B8A2">${totalCount()}</div><div class="stat-label">TOTAL</div></div>`
    + CATEGORIES.map(cat => `<div class="stat-item"><div class="stat-num" style="color:${cat.color}">${ENTRIES[cat.id].length}</div><div class="stat-label">${cat.label}</div></div>`).join("");

  // Cat grid
  document.getElementById("cat-grid").innerHTML = CATEGORIES.map(cat => `
    <button class="cat-card" onclick="setCategory('${cat.id}')">
      <div class="icon" style="color:${cat.color}">${cat.icon}</div>
      <div class="name">${cat.label}</div>
      <div class="count">${ENTRIES[cat.id].length} 件</div>
    </button>`).join("");

  // Recent
  const all = Object.entries(ENTRIES).flatMap(([catId, arr]) => arr.map(e => ({ ...e, catId })))
    .sort((a,b) => b.id - a.id).slice(0, 5);
  const recEl = document.getElementById("recent-list");
  if (!all.length) {
    recEl.innerHTML = `<div class="empty-msg">まだ記録がありません。<br><span style="color:#5A5248">カテゴリを選んで自分を記録しましょう。</span></div>`;
  } else {
    recEl.innerHTML = all.map(e => {
      const cat = CATEGORIES.find(c => c.id === e.catId);
      return `<div class="recent-item">
        <span class="icon" style="color:${cat.color}">${cat.icon}</span>
        <div style="flex:1">
          <div class="tag">${escHtml(e.tag)}</div>
          ${e.summary ? `<div class="summary">${escHtml(e.summary)}</div>` : ""}
        </div>
        <span class="date">${e.createdAt}</span>
      </div>`;
    }).join("");
  }
}

function setCategory(catId) {
  activeCategory = catId;
  showView("category");
}

function renderCategory() {
  const cat = CATEGORIES.find(c => c.id === activeCategory);

  // Tabs
  document.getElementById("cat-tabs").innerHTML = CATEGORIES.map(c => {
    const active = c.id === activeCategory;
    return `<button class="cat-tab" style="${active ? `color:${c.color};border-color:${c.color}60;background:rgba(232,224,213,0.06)` : ""}" onclick="setActiveCategory('${c.id}')">${c.icon} ${c.label}</button>`;
  }).join("");

  // Input label & placeholder
  document.getElementById("input-label").textContent = `${cat.icon} ${cat.label} を記録する`;
  document.getElementById("new-entry-text").placeholder = `${cat.desc}について、思ったことをそのまま書いてください…`;

  // Records label
  document.getElementById("records-label").textContent = `RECORDS — ${ENTRIES[activeCategory].length}件`;

  // Entries
  const list = document.getElementById("entries-list");
  if (!ENTRIES[activeCategory].length) {
    list.innerHTML = `<div class="empty-msg">まだ記録がありません</div>`;
    return;
  }
  list.innerHTML = ENTRIES[activeCategory].map(entry => {
    const isEditing = editingEntry && editingEntry.catId === activeCategory && editingEntry.entryId === entry.id;
    if (isEditing) {
      return `<div class="entry-card">
        <div class="edit-label">編集中</div>
        <textarea class="edit-area" id="edit-area-${entry.id}">${escHtml(entry.raw)}</textarea>
        <div class="edit-actions">
          <button class="cancel-btn" onclick="cancelEdit()">キャンセル</button>
          <button class="update-btn" id="update-btn-${entry.id}" onclick="saveEdit('${activeCategory}', ${entry.id})">保存</button>
        </div>
      </div>`;
    }
    return `<div class="entry-card">
      <div class="entry-row">
        <div style="flex:1">
          <div class="entry-tag" style="color:${cat.color}">${escHtml(entry.tag)}</div>
          ${entry.summary ? `<div class="entry-summary">${escHtml(entry.summary)}</div>` : ""}
          <details>
            <summary class="entry-raw-toggle">原文を見る</summary>
            <div class="entry-raw">${escHtml(entry.raw)}</div>
          </details>
        </div>
        <div class="entry-actions">
          <span class="entry-date">${entry.createdAt}</span>
          <div class="entry-btns">
            <button class="edit-btn" onclick="startEdit('${activeCategory}', ${entry.id})">編集</button>
            <button class="del-btn" onclick="removeEntry('${activeCategory}', ${entry.id})">×</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
}

function setActiveCategory(catId) {
  activeCategory = catId;
  editingEntry = null;
  renderCategory();
}

function renderYourData() {
  const sec = document.getElementById("your-data-section");
  const total = totalCount();
  if (!total) { sec.innerHTML = ""; return; }
  sec.innerHTML = `<div class="your-data"><div class="section-label">YOUR DATA</div>`
    + CATEGORIES.map(cat => {
        if (!ENTRIES[cat.id].length) return "";
        return `<div class="your-data-cat">
          <div class="your-data-label" style="color:${cat.color}">${cat.icon} ${cat.label}</div>
          <div class="tag-pills">${ENTRIES[cat.id].map(e => `<span class="tag-pill">${escHtml(e.tag)}</span>`).join("")}</div>
        </div>`;
      }).join("")
    + `</div>`;
}

function escHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
